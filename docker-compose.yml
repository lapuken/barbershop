name: smart-barber-shops

services:
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-app.machinjiri.net}
      ACME_EMAIL: ${ACME_EMAIL:-admin@machinjiri.net}
      TZ: ${TZ:-UTC}
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - staticfiles:/srv/staticfiles:ro
      - mediafiles:/srv/media:ro
    networks:
      - edge
      - app

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    command: ["/app/docker/start-web.sh"]
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartbarber}
      POSTGRES_USER: ${POSTGRES_USER:-smartbarber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_me}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartbarber} -d ${POSTGRES_DB:-smartbarber}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  staticfiles:
  mediafiles:

networks:
  edge:
    driver: bridge
  app:
    driver: bridge
    internal: true
