name: smart-barber-shops

services:
  web:
    build:
      context: .
    restart: unless-stopped
    init: true
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    env_file:
      - ${ENV_FILE_PATH:-.env}
    command: ["/app/docker/start-web.sh"]
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    volumes:
      - ./shared/static:/app/staticfiles
      - ./shared/media:/app/media
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh", "container"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartbarber}
      POSTGRES_USER: ${POSTGRES_USER:-smartbarber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_me}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartbarber} -d ${POSTGRES_DB:-smartbarber}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
