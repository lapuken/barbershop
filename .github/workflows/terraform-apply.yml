name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod
      app_release_sha:
        description: Optional image release SHA or bootstrap marker
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TF_ENVIRONMENT: ${{ inputs.environment }}
      TF_VAR_project_name: smartbarbershops
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_github_environment: ${{ inputs.environment }}
      TF_VAR_location: ${{ vars.TF_LOCATION }}
      TF_VAR_name_suffix: ${{ vars.TF_NAME_SUFFIX }}
      TF_VAR_owner: ${{ vars.TF_OWNER }}
      TF_VAR_team: ${{ vars.TF_TEAM }}
      TF_VAR_cost_center: ${{ vars.TF_COST_CENTER }}
      TF_VAR_acr_sku: ${{ vars.TF_ACR_SKU }}
      TF_VAR_log_analytics_retention_days: ${{ vars.TF_LOG_RETENTION_DAYS }}
      TF_VAR_key_vault_purge_protection_enabled: ${{ vars.TF_KEYVAULT_PURGE_PROTECTION }}
      TF_VAR_postgres_sku_name: ${{ vars.TF_POSTGRES_SKU_NAME }}
      TF_VAR_postgres_storage_mb: ${{ vars.TF_POSTGRES_STORAGE_MB }}
      TF_VAR_postgres_backup_retention_days: ${{ vars.TF_POSTGRES_BACKUP_RETENTION_DAYS }}
      TF_VAR_postgres_zone: ${{ vars.TF_POSTGRES_ZONE }}
      TF_VAR_postgres_database_name: ${{ vars.TF_POSTGRES_DATABASE_NAME }}
      TF_VAR_container_image: ${{ vars.AZURE_ACR_LOGIN_SERVER }}/smartbarber/web:${{ inputs.app_release_sha != '' && inputs.app_release_sha || 'bootstrap' }}
      TF_VAR_app_release_sha: ${{ inputs.app_release_sha != '' && inputs.app_release_sha || 'bootstrap' }}
      TF_VAR_container_app_target_port: ${{ vars.TF_CONTAINER_APP_TARGET_PORT }}
      TF_VAR_container_app_min_replicas: ${{ vars.TF_CONTAINER_APP_MIN_REPLICAS }}
      TF_VAR_container_app_max_replicas: ${{ vars.TF_CONTAINER_APP_MAX_REPLICAS }}
      TF_VAR_container_app_cpu: ${{ vars.TF_CONTAINER_APP_CPU }}
      TF_VAR_container_app_memory: ${{ vars.TF_CONTAINER_APP_MEMORY }}
      TF_VAR_whatsapp_phone_number_id: ${{ vars.TF_WHATSAPP_PHONE_NUMBER_ID }}
      TF_VAR_django_allowed_hosts: ${{ vars.TF_DJANGO_ALLOWED_HOSTS }}
      TF_VAR_django_csrf_trusted_origins: ${{ vars.TF_DJANGO_CSRF_TRUSTED_ORIGINS }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_INFRA_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Generate Terraform tfvars
        run: ./scripts/azure/write-terraform-tfvars.sh infra/generated.auto.tfvars
      - name: Terraform init
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=smartbarbershops/${TF_ENVIRONMENT}/terraform.tfstate"
      - name: Terraform apply
        run: terraform -chdir=infra apply -input=false -auto-approve -var-file=generated.auto.tfvars
