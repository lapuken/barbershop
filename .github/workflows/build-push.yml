name: Build And Push

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target GitHub environment
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: Override image tag. Defaults to the commit SHA.
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      IMAGE_REPOSITORY: smartbarber/web
      IMAGE_TAG: ${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ vars.AZURE_ACR_NAME }}"
      - name: Build and push immutable image
        run: |
          IMAGE="${{ vars.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"
      - name: Push moving tag for non-production
        if: inputs.environment == 'dev'
        run: |
          docker tag "${IMAGE}" "${{ vars.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_REPOSITORY}:latest"
          docker push "${{ vars.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_REPOSITORY}:latest"
