name: Deploy Dev

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-dev.yml"
      - ".github/workflows/build-push.yml"
      - "Dockerfile"
      - "docker/**"
      - "apps/**"
      - "config/**"
      - "templates/**"
      - "static/**"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      IMAGE_REPOSITORY: smartbarber/web
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ vars.AZURE_ACR_NAME }}"
      - name: Build and push image
        run: |
          IMAGE="${{ vars.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          docker tag "${IMAGE}" "${{ vars.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_REPOSITORY}:latest"
          docker push "${{ vars.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_REPOSITORY}:latest"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"
      - name: Run Django migrations
        run: ./scripts/azure/run-migration-job.sh "${{ vars.AZURE_RESOURCE_GROUP }}" "${{ vars.AZURE_MIGRATION_JOB_NAME }}" "${IMAGE}"
      - name: Deploy web revision
        run: |
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --image "${IMAGE}" \
            --set-env-vars APP_RELEASE_SHA="${GITHUB_SHA}" \
            --output none
      - name: Verify deployment
        run: ./scripts/azure/wait-for-containerapp.sh "${{ vars.AZURE_RESOURCE_GROUP }}" "${{ vars.AZURE_CONTAINER_APP_NAME }}"
