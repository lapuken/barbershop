name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smart_barber_shops
          POSTGRES_USER: smart_barber
          POSTGRES_PASSWORD: smart_barber
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smart_barber -d smart_barber_shops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key
      POSTGRES_DB: smart_barber_shops
      POSTGRES_USER: smart_barber
      POSTGRES_PASSWORD: smart_barber
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_SSLMODE: disable
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          ruff check .
          black --check .
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Run tests
        run: python manage.py test
      - name: Build container image
        run: docker build -t smart-barber-shops:ci .
