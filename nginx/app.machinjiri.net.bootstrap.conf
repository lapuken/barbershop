server {
    listen 80;
    listen [::]:80;
    server_name machinjiri.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 302 http://app.machinjiri.net$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name app.machinjiri.net;

    client_max_body_size 10m;
    access_log /opt/smartbarber/logs/nginx/app.machinjiri.net.access.log;
    error_log /opt/smartbarber/logs/nginx/app.machinjiri.net.error.log warn;
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /opt/smartbarber/app/shared/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /media/ {
        return 404;
    }
}
