{% extends "base.html" %}
{% block auth_content %}
<section class="login-card card shadow-sm border-0">
    <div class="card-body p-4">
        <h1 class="h4 mb-3">Choose a new password</h1>
        <form method="post">
            {% csrf_token %}
            {% include "includes/form_fields.html" with form=form %}
            <button class="btn btn-primary" type="submit">Update password</button>
        </form>
    </div>
</section>
{% endblock %}
