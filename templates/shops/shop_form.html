{% extends "base.html" %}
{% block content %}
<div class="page-header mb-4"><h1 class="h3">{% if object %}Edit Shop{% else %}New Shop{% endif %}</h1></div>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% include "includes/form_fields.html" with form=form %}
            <button class="btn btn-primary" type="submit">Save Shop</button>
        </form>
    </div>
</div>
{% endblock %}
